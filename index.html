<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DariKitaUntukMereka</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #000000, #434343);
            color: #e0e0e0;
            text-align: center;
        }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h1 {
            font-size: 3em;
            margin: 0;
            color: #c0c0c0; /* silver */
            letter-spacing: 2px;
        }

        p {
            font-size: 1.2em;
            margin-top: 10px;
            color: #aaaaaa;
        }

        .btn {
            margin-top: 25px;
            padding: 12px 30px;
            background: linear-gradient(45deg, #c0c0c0, #f5f5f5);
            color: #000;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: linear-gradient(45deg, #ffffff, #c0c0c0);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1>DariKitaUntukMereka</h1>
        <p>"Barang Lama, Harapan Baru:"</p>
        <button class="btn">Mulai Donasi</button>
    </section>

</body>
</html>
